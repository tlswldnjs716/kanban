<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스티치 칸반보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 인증 오버레이 -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <div class="stitch-face">
        <img src="stitch.png" alt="스티치" class="auth-stitch">
      </div>
      <h2 class="auth-card-title" id="auth-card-title">로그인</h2>
      <p class="auth-desc">스티치 칸반보드에 오신 걸 환영해요! 🌊</p>

      <form id="auth-form" novalidate>
        <input type="email" id="auth-email" class="auth-input" placeholder="이메일" autocomplete="email" required>
        <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호" autocomplete="current-password" required>
        <p id="auth-error" class="auth-error" hidden></p>
        <button type="submit" id="auth-submit-btn" class="auth-submit">로그인</button>
      </form>

      <p class="auth-switch-text">
        <span id="auth-toggle-text">계정이 없으신가요?</span>
        <a href="#" id="auth-toggle-link">가입하기</a>
      </p>

      <div class="auth-divider"><span>또는</span></div>

      <div class="auth-social">
        <button type="button" id="github-btn" class="social-btn github-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub로 계속하기
        </button>
        <button type="button" id="google-btn" class="social-btn google-btn">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google로 계속하기
        </button>
      </div>
    </div>
  </div>

  <!-- 배경 버블 -->
  <div class="bubbles" aria-hidden="true">
    <div class="bubble" style="--size:60px;  --left:8%;  --dur:9s;  --delay:0s;   --op:0.10"></div>
    <div class="bubble" style="--size:30px;  --left:20%; --dur:7s;  --delay:1.5s; --op:0.13"></div>
    <div class="bubble" style="--size:80px;  --left:35%; --dur:11s; --delay:0.5s; --op:0.08"></div>
    <div class="bubble" style="--size:20px;  --left:50%; --dur:8s;  --delay:3s;   --op:0.15"></div>
    <div class="bubble" style="--size:50px;  --left:65%; --dur:10s; --delay:1s;   --op:0.10"></div>
    <div class="bubble" style="--size:35px;  --left:78%; --dur:7s;  --delay:2s;   --op:0.12"></div>
    <div class="bubble" style="--size:70px;  --left:90%; --dur:12s; --delay:0s;   --op:0.07"></div>
  </div>

  <!-- 헤더 -->
  <header>
    <div class="stitch-face">
      <img src="stitch.png" alt="스티치" class="stitch-img">
    </div>
    <h1 class="title">스티치 칸반보드</h1>
    <p class="subtitle">오늘도 할 일을 척척 해치워봐요! 🌊</p>
    <div class="user-bar" id="user-bar" hidden>
      <span id="user-email-label"></span>
      <button type="button" id="logout-btn" class="logout-btn">로그아웃</button>
    </div>
  </header>

  <!-- 칸반 보드 -->
  <div class="board">
    <section class="column" data-status="todo">
      <header class="column-header column-header--todo">
        <h2>To-do</h2>
        <span class="card-count" data-count-for="todo">0</span>
      </header>
      <form class="add-card-form" data-status="todo">
        <label class="visually-hidden" for="todo-input">To-do 카드 추가</label>
        <input type="text" id="todo-input" placeholder="새 카드 추가..." autocomplete="off">
        <button type="submit">+</button>
      </form>
      <ul class="card-list" data-status="todo"></ul>
    </section>

    <section class="column" data-status="inprogress">
      <header class="column-header column-header--inprogress">
        <h2>In-progress</h2>
        <span class="card-count" data-count-for="inprogress">0</span>
      </header>
      <form class="add-card-form" data-status="inprogress">
        <label class="visually-hidden" for="inprogress-input">In-progress 카드 추가</label>
        <input type="text" id="inprogress-input" placeholder="새 카드 추가..." autocomplete="off">
        <button type="submit">+</button>
      </form>
      <ul class="card-list" data-status="inprogress"></ul>
    </section>

    <section class="column" data-status="done">
      <header class="column-header column-header--done">
        <h2>Done ✓</h2>
        <span class="card-count" data-count-for="done">0</span>
      </header>
      <form class="add-card-form" data-status="done">
        <label class="visually-hidden" for="done-input">Done 카드 추가</label>
        <input type="text" id="done-input" placeholder="새 카드 추가..." autocomplete="off">
        <button type="submit">+</button>
      </form>
      <ul class="card-list" data-status="done"></ul>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js" defer></script>
</body>
</html>
